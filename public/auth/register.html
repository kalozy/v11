<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Criar Conta — Traffic Control</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#f5f6f8;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:16px;padding:40px;width:100%;max-width:420px;box-shadow:0 4px 24px rgba(0,0,0,0.06)}
.logo{text-align:center;margin-bottom:32px}
.logo-text{font-size:22px;font-weight:800;color:#0f172a;letter-spacing:-0.5px}
.logo-sub{font-size:12px;color:#6b7280;margin-top:2px;letter-spacing:1px;text-transform:uppercase}
h1{font-size:20px;font-weight:700;color:#0f172a;margin-bottom:6px}
.subtitle{font-size:13px;color:#6b7280;margin-bottom:28px}
.form-group{margin-bottom:16px}
label{display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:5px}
input{width:100%;padding:10px 12px;border:1px solid #e5e7eb;border-radius:8px;font-family:'Inter',sans-serif;font-size:14px;color:#0f172a;outline:none;transition:border .15s,box-shadow .15s}
input:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,0.1)}
.btn{width:100%;padding:11px;background:#3b82f6;border:none;border-radius:8px;color:#fff;font-family:'Inter',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;margin-top:4px}
.btn:hover{background:#2563eb}
.btn:disabled{opacity:.6;cursor:not-allowed}
.error{background:#fef2f2;color:#dc2626;border:1px solid #fca5a5;border-radius:8px;padding:10px 12px;font-size:13px;margin-bottom:16px;display:none}
.terms{font-size:11px;color:#9ca3af;margin-top:14px;text-align:center;line-height:1.5}
.link-row{text-align:center;margin-top:20px;font-size:13px;color:#6b7280}
.link-row a{color:#3b82f6;font-weight:500;text-decoration:none}
.link-row a:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-text">⚡ Traffic Control</div>
    <div class="logo-sub">SaaS Platform</div>
  </div>
  <h1>Criar conta</h1>
  <p class="subtitle">Comece a usar agora mesmo</p>
  <div class="error" id="error-box"></div>
  <div class="form-group">
    <label>Nome completo</label>
    <input type="text" id="name" placeholder="Seu nome" autocomplete="name">
  </div>
  <div class="form-group">
    <label>E-mail</label>
    <input type="email" id="email" placeholder="seu@email.com" autocomplete="email">
  </div>
  <div class="form-group">
    <label>Senha <span style="font-size:11px;font-weight:400;color:#9ca3af">(mín. 6 caracteres)</span></label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="new-password">
  </div>
  <div class="form-group">
    <label>Confirmar senha</label>
    <input type="password" id="confirm" placeholder="••••••••" autocomplete="new-password" onkeydown="if(event.key==='Enter')register()">
  </div>
  <button class="btn" id="btn" onclick="register()">Criar minha conta</button>
  <p class="terms">Ao criar uma conta você concorda com os termos de uso da plataforma.</p>
  <div class="link-row">Já tem conta? <a href="/login">Entrar</a></div>
</div>
<script>
async function register() {
  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const confirm = document.getElementById('confirm').value;
  const errBox = document.getElementById('error-box');
  const btn = document.getElementById('btn');
  errBox.style.display = 'none';
  if (!name||!email||!password) { errBox.textContent='Preencha todos os campos'; errBox.style.display='block'; return; }
  if (password !== confirm) { errBox.textContent='Senhas não coincidem'; errBox.style.display='block'; return; }
  if (password.length < 6) { errBox.textContent='Senha mínimo 6 caracteres'; errBox.style.display='block'; return; }
  btn.disabled=true; btn.textContent='Criando conta...';
  try {
    const res = await fetch('/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,email,password,confirm})});
    const data = await res.json();
    if (data.ok) { window.location.href = data.redirect || '/dashboard'; }
    else { errBox.textContent=data.error||'Erro ao criar conta'; errBox.style.display='block'; }
  } catch { errBox.textContent='Erro de conexão'; errBox.style.display='block'; }
  finally { btn.disabled=false; btn.textContent='Criar minha conta'; }
}
</script>
</body>
</html>
