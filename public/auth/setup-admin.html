<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Setup Admin — Traffic Control</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#f5f6f8;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:16px;padding:40px;width:100%;max-width:440px;box-shadow:0 4px 24px rgba(0,0,0,.06)}
.icon{font-size:40px;text-align:center;margin-bottom:16px}
h1{font-size:20px;font-weight:700;color:#0f172a;margin-bottom:6px;text-align:center}
.subtitle{font-size:13px;color:#6b7280;margin-bottom:28px;text-align:center;line-height:1.6}
.notice{background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:11px 14px;font-size:12px;color:#92400e;margin-bottom:24px;line-height:1.6}
.form-group{margin-bottom:16px}
label{display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:5px}
input{width:100%;padding:10px 12px;border:1px solid #e5e7eb;border-radius:8px;font-family:'Inter',sans-serif;font-size:14px;color:#0f172a;outline:none;transition:border .15s,box-shadow .15s}
input:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.1)}
.btn{width:100%;padding:11px;background:#3b82f6;border:none;border-radius:8px;color:#fff;font-family:'Inter',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;margin-top:4px}
.btn:hover{background:#2563eb}
.btn:disabled{opacity:.6;cursor:not-allowed}
.error{background:#fef2f2;color:#dc2626;border:1px solid #fca5a5;border-radius:8px;padding:10px 12px;font-size:13px;margin-bottom:16px;display:none}
</style>
</head>
<body>
<div class="card">
  <div class="icon">⚙️</div>
  <h1>Configuração Inicial</h1>
  <p class="subtitle">Crie o Super Admin para começar a usar o Traffic Control</p>
  <div class="notice">
    ⚠️ Esta página só está disponível enquanto não há nenhum administrador cadastrado. Após criar o admin, ela será desativada automaticamente.
  </div>
  <div class="error" id="err"></div>
  <div class="form-group">
    <label>Nome</label>
    <input type="text" id="name" placeholder="Seu nome completo">
  </div>
  <div class="form-group">
    <label>E-mail</label>
    <input type="email" id="email" placeholder="admin@seusite.com">
  </div>
  <div class="form-group">
    <label>Senha</label>
    <input type="password" id="password" placeholder="Mínimo 6 caracteres">
  </div>
  <button class="btn" id="btn" onclick="setup()">Criar Super Admin</button>
</div>
<script>
async function setup() {
  const name=document.getElementById('name').value.trim();
  const email=document.getElementById('email').value.trim();
  const password=document.getElementById('password').value;
  const err=document.getElementById('err');
  const btn=document.getElementById('btn');
  err.style.display='none';
  if(!name||!email||!password){err.textContent='Preencha todos os campos';err.style.display='block';return;}
  btn.disabled=true;btn.textContent='Criando...';
  try{
    const res=await fetch('/setup-admin',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,email,password})});
    const d=await res.json();
    if(d.ok){window.location.href=d.redirect||'/admin';}
    else{err.textContent=d.error||'Erro';err.style.display='block';}
  }catch{err.textContent='Erro de conexão';err.style.display='block';}
  finally{btn.disabled=false;btn.textContent='Criar Super Admin';}
}
</script>
</body>
</html>
